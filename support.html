<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabbi Support</title>
    <style>
      :root {
        --bg: #f7f9fc;
        --card: #ffffff;
        --text: #1a1f36;
        --muted: #5f6b8a;
        --accent: #2f6bff;
        --border: #e5e9f2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
      }
      h1 { margin: 0 0 8px; }
      h2 { margin: 24px 0 8px; }
      .muted { color: var(--muted); }
      a { color: var(--accent); }
      ul { margin-top: 8px; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Tabbi Support</h1>
        <p class="muted">Need help with your Tabbi account or app experience? Contact support below.</p>
        <h2>Contact</h2>
        <p>
          Email:
          <a href="mailto:davidsprogramplayground@gmail.com">davidsprogramplayground@gmail.com</a>
        </p>
        <h2>What to include in support requests</h2>
        <ul>
          <li>Your device model and iOS version</li>
          <li>What happened and what you expected</li>
          <li>Screenshots if available</li>
        </ul>
      </section>
    </main>
  </body>
</html>
